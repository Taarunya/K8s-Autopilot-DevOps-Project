apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: autopilot
  labels:
    app: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: k8s-autopilot-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PREDICTOR_URL
              value: "http://predictor:8001"
            - name: OPERATOR_URL
              value: "http://operator:8002"
            - name: PROMETHEUS_URL
              value: "http://prometheus:9090"
            - name: REDIS_URL
              value: "redis://redis:6379"
          livenessProbe:
            httpGet:
              path: /api/summary
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/summary
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 300m
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: autopilot
  labels:
    app: dashboard
spec:
  type: LoadBalancer
  selector:
    app: dashboard
  ports:
    - port: 80
      targetPort: 3000
