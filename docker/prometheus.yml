global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "autopilot-exporter"
    static_configs:
      - targets: ["exporter:8000"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: "autopilot-predictor"
    static_configs:
      - targets: ["predictor:8001"]
    metrics_path: /metrics

  - job_name: "autopilot-operator"
    static_configs:
      - targets: ["operator:8002"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]